      <a routerLink="/" class="btn btn-outline-light me-2">

<!-- LOGIN -->

<div class="login-bg">

  <div class="login-card">

    <div class="login-header">
      <h3>Bienvenido</h3>
      <p>Ingresa tus datos para continuar</p>
    </div>

    <form (ngSubmit)="login()">

      <div class="form-group">

        <label>Correo electrónico</label>

        <input
          type="email"
          class="form-control"
          placeholder="usuario@email.com"
          [(ngModel)]="email"
          name="email"
          required
        >

      </div>

      <div class="form-group">

        <label>Contraseña</label>

        <input
          type="password"
          class="form-control"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          required
        >

      </div>

      <button class="btn btn-login w-100">
        Ingresar
      </button>

    </form>

    <div class="divider"></div>

    <div class="text-center">

      <p class="text-muted">
        ¿No tienes cuenta?
      </p>

      <a routerLink="/register" class="btn btn-outline-secondary w-100">
        Crear cuenta
      </a>

    </div>

  </div>

</div>
