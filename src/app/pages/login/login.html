<div class="container vh-100 d-flex justify-content-center align-items-center">

  <div class="col-md-4">

    <div class="card shadow-lg">

      <div class="card-header bg-primary text-white text-center">
        <h4>Login</h4>
      </div>

      <div class="card-body">

        <form (ngSubmit)="login()">

          <input
          type="email"
          class="form-control mb-3"
          placeholder="Email"
          [(ngModel)]="email"
          name="email"
          required
          >

          <input
          type="password"
          class="form-control mb-3"
          placeholder="Password"
          [(ngModel)]="password"
          name="password"
          required
          >

          <button class="btn btn-primary w-100">
            Iniciar sesión
          </button>

        </form>

        <a routerLink="/register" class="btn btn-secondary w-100 mt-2">
          Crear cuenta
        </a>

      </div>

    </div>

  </div>

</div>
